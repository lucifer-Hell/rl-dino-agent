run:
  name: "dqn-visual-baseline"
  seed: 7
  output_root: "runs"
  save_replay_frames: false

game:
  repo_path: "D:/rl-dino"
  index_file: "index.html"
  serve:
    host: "127.0.0.1"
    port: 8000
    auto_start: true
  browser:
    headless: false
    slow_mo_ms: 0
    viewport_width: 960
    viewport_height: 540
  env:
    canvas_selector: "#game"
    frame_width: 84
    frame_height: 84
    frame_stack: 4
    grayscale: true
    step_ms: 16.6667
    max_episode_steps: 5000

training:
  total_timesteps: 150000
  learning_rate: 0.0001
  buffer_size: 50000
  learning_starts: 2000
  batch_size: 32
  gamma: 0.99
  train_freq: 4
  gradient_steps: 1
  target_update_interval: 1000
  exploration_fraction: 0.2
  exploration_initial_eps: 1.0
  exploration_final_eps: 0.05
  stats_window_size: 50
  tensorboard_log_subdir: "tensorboard"
  save_checkpoint_every_steps: 10000
  keep_last_checkpoints: 3
  save_replay_buffer_checkpoints: false
  plot_every_episodes: 10
  model_policy: "CnnPolicy"
  device: "auto"
  verbose: 1

evaluation:
  deterministic: true
  episodes: 5
